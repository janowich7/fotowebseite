backend:
  name: git-gateway
  branch: main

media_folder: "bilder"
public_folder: "/bilder"

collections:
  - name: "einstellungen"
    label: "Website Einstellungen"
    files:
      - name: "allgemein"
        label: "Allgemein"
        file: "_data/einstellungen.json"
        fields:
          - { label: "Businessname", name: "name", widget: "string", default: "Jan Photography" }
          - { label: "Slogan", name: "slogan", widget: "string", default: "Bilder die bleiben." }
          - { label: "Telefon", name: "telefon", widget: "string", default: "077 463 75 99" }
          - { label: "E-Mail", name: "email", widget: "string", default: "" }
          - { label: "Standort", name: "standort", widget: "string", default: "Bern, Schweiz" }
          - { label: "Text über mich", name: "uebermich", widget: "text", default: "Seit fünf Jahren halte ich fest was mich bewegt. Fahrzeuge in Bewegung, Momente auf der Strasse, das Licht in der Natur. Das Besondere liegt im Detail, und genau das suche ich." }

  - name: "portfolio"
    label: "Portfolio Fotos"
    folder: "_fotos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Foto", name: "bild", widget: "image" }
      - { label: "Kategorie", name: "kategorie", widget: "select", options: ["motion", "street", "natur", "details"] }
